<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yuki Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
   <div class="logo">
    <img src="logo.png" alt="Yuki Logo">
       <div class="logo">🌸 Yuki</div>
   </div>
    <nav>
        <input type="text" id="search" placeholder="Search products...">
        <a href="#products">Products</a>
        <a href="#cart">Cart <span id="cart-count">0</span></a>
    </nav>
    </header>

    <section class="hero">
    <h1>Welcome to Yuki Store</h1>
    <p>Cute, Luxury & Modern Fashion</p>
    <button onclick="scrollToProducts()">Shop Now</button>
    </section>

    <section id="products" class="products">
    <h2>Our Products</h2>
    <div class="product-list" id="product-list"></div>
    </section>

    <section id="cart" class="cart">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: $<span id="total">0</span></h3>
    <button id="checkout-btn" class="cute-checkout">
    💳 Secure Checkout
    </button>
    </section>

    <footer>
    <p>© 2026 Yuki Store | Contact: storeyuki2@gmail.com</p>
    </footer>

<script src="script.js"></script>
<button id="stripe-btn">Pay with Stripe</button>
</body>

</html>
